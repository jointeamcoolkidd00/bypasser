<!DOCTYPE html>
<html>
<head>
    <title>My Private Bypasser</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background: #121212; color: white; }
        input { padding: 15px; width: 80%; border-radius: 10px; border: none; margin-bottom: 10px; }
        button { padding: 15px 30px; background: #7c4dff; color: white; border: none; border-radius: 10px; cursor: pointer; }
        #result { margin-top: 20px; padding: 20px; background: #1e1e1e; border-radius: 10px; word-break: break-all; }
    </style>
</head>
<body>
    <h1>Bypass.vip Clone</h1>
    <input type="text" id="urlInput" placeholder="Paste Linkvertise/Delta Link Here...">
    <br>
    <button onclick="bypass()">Bypass Link</button>
    <div id="result">Your link will appear here...</div>

    <script>
        async function bypass() {
            const url = document.getElementById('urlInput').value;
            const resBox = document.getElementById('result');
            resBox.innerHTML = "Bypassing... please wait (30-60s)";
            
            const response = await fetch(`/api?url=${encodeURIComponent(url)}`);
            const data = await response.json();
            
            if (data.success) {
                resBox.innerHTML = `<a href="${data.result}" target="_blank" style="color:#7c4dff">${data.result}</a>`;
            } else {
                resBox.innerHTML = "Error: " + (data.details || "Bypass failed");
            }
        }
    </script>
</body>
</html>
